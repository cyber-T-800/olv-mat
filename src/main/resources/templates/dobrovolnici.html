<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dobrovoľníci – Majáles</title>
    <link type="text/css" rel="stylesheet" href="/stylesheet.css">
</head>

<body>
<div class="obal">
    <a href="/"
       class="button big white" style="margin-left: 0.75rem;">
        <strong>Späť na hlavnú stránku</strong>
    </a>
    <div style="height:1rem;"></div>

    <div th:utext="${popisUdalosti}"></div>
    <div style="height:1.5rem;"></div>
    
    <form method="post">
        <label for="name">Meno a priezvisko:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Emailová adresa:</label>
        <input type="email" id="email" name="email" required>

        <label for="text">Poznámka:</label>
        <input type="text" id="text" name="text">


        <h3>Služby</h3>
        <p>Vyber služby zaškrtnutím. Každá označená služba sa presunie pod najnižšiu už zaškrtnutú položku.</p>
        <p>(Hore sú služby, ktoré si vybral ako prvé.)</p>
        <div style="height:1.5rem;"></div>

        <table id="services">
            <colgroup>
                <col style="width: auto">
                <col style="width: 20px">
            </colgroup>

            <tbody>
            <tr th:each="service : ${services}" class="service-row">
                <td th:text="${service}">Služba</td>
                <td>
                    <input type="checkbox" class="service-checkbox" aria-label="Vybrať službu">
                </td>
            </tr>
            </tbody>
        </table>
        <div style="height:2.5rem;"></div>


        <h3>Program a dostupnosť</h3>
        <p>Pozri si program a zaklikni bloky, kedy môžeš prísť pomôcť.</p>
        <div style="height:1.5rem;"></div>

        <table id="calendar">
            <colgroup>
                <col style="width: 15.65%">
                <col style="width: 42.17%">
                <col style="width: 42.17%">
            </colgroup>

            <thead>
            <tr>
                <th>Čas</th>
                <th>Program</th>
                <th>Dostupnosť</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>


        <div style="height:1rem;"></div>
        <input class="button big blue" style="width:100%;" type="submit" value="Odoslať dostupnosť">
    </form>
    <div style="height:1.5rem;"></div>
</div>


<script th:inline="javascript">
const program = /*[[${program}]]*/ null;
const startHour = /*[[${startHour}]]*/ 16;
const endHour = /*[[${endHour}]]*/ 22;
const blockRowspan = /*[[${blockRowspan}]]*/ 12;

let totalHours = (endHour <= startHour)
    ? (endHour + 24 - startHour)
    : (endHour - startHour);
let totalRows = totalHours * 12;

function renderTable() {
    let tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let programIndex = 0;
    let remainingSpan = program[0]?.rowspan || 0;

    for (let row = 0; row < totalRows; row++) {
        let tr = document.createElement("tr");

        // ===== 1. STĹPEC – HODINY =====
        if ((row % 12) === 0) {
            let now = (row / 12 + startHour) % 24;
            let next = (now + 1) % 24;

            let td = document.createElement("td");
            td.rowSpan = 12;

            td.innerHTML = `
                <div style="
                    display: flex;
                    flex-direction: column;
                ">
                    <span>${now}:00</span>
                    <span>–</span>
                    <span>${next}:00</span>
                </div>
            `;

            tr.appendChild(td);
        }


        // ===== 2. STĹPEC – EVENTY =====
        if (remainingSpan === program[programIndex].rowspan) {
            let td = document.createElement("td");
            td.rowSpan = program[programIndex].rowspan;
            td.innerText = program[programIndex].text;
            td.style.backgroundColor = program[programIndex].color;
            tr.appendChild(td);
        }

        remainingSpan--;

        if (remainingSpan === 0) {
            programIndex++;
            if (program[programIndex]) {
                remainingSpan = program[programIndex].rowspan;
            }
        }


        // ===== 3. STĹPEC – CHECKBOXY =====
        if (row % blockRowspan === 0) {
            let td = document.createElement("td");
            td.rowSpan = blockRowspan;
            td.className = "slot";
            td.dataset.start = (row / 12 + startHour) % 24;
            td.innerText = "klikni sem pre výber času";
            slotTds.push(td);
            tr.appendChild(td);
        }


        tbody.appendChild(tr);
    }
}

const slotTds = [];
renderTable();



// ===== DRAG-SELECT LOGIKA =====
let isDragging = false;
let dragIntent = null;

function setSlot(td, active) {
    td.classList.toggle("active", active);
    td.innerText = active
        ? "čas zvolený"
        : "klikni sem pre výber času";
}

slotTds.forEach(td => {
    td.addEventListener("mousedown", e => {
        e.preventDefault();
        isDragging = true;
        dragIntent = !td.classList.contains("active");
        setSlot(td, dragIntent);
    });

    td.addEventListener("mouseenter", () => {
        if (!isDragging) return;
        setSlot(td, dragIntent);
    });
});

document.addEventListener("mouseup", () => {
    isDragging = false;
    dragIntent = null;
});



// ===== TABULKA SLUZIEB =====
const servicesTbody = document.querySelector("#services tbody");

servicesTbody.addEventListener('change', e => {
    const checkbox = e.target.closest('.service-checkbox');
    if (!checkbox) return;

    const row = checkbox.closest('tr');
    const checkedCheckboxes = [...servicesTbody.querySelectorAll('.service-checkbox:checked')];
    const checkedRowsExceptCurrent = checkedCheckboxes
        .filter(c => c !== checkbox)
        .map(c => c.closest('tr'));

    if (checkbox.checked) {
        if (checkedRowsExceptCurrent.length > 0) {
            checkedRowsExceptCurrent[checkedRowsExceptCurrent.length - 1].after(row);
        } else {
            servicesTbody.prepend(row);
        }
    } else {
        servicesTbody.append(row);
    }

    row.classList.add('moved');
    window.setTimeout(() => row.classList.remove('moved'), 400);
});

servicesTbody.addEventListener('click', e => {
    const row = e.target.closest('tr');
    if (!row || !row.classList.contains('service-row')) return;
    if (e.target.closest('.service-checkbox')) return;

    const checkbox = row.querySelector('.service-checkbox');
    if (!checkbox) return;
    checkbox.click();
});



// ===== SUBMIT FORM =====
document.querySelector("form").addEventListener("submit", function(e) {
    const checked = [...document.querySelectorAll("#calendar td.slot.active")]
        .map(td => td.dataset.start);

    if (checked.length === 0) {
        e.preventDefault();
        alert("Nie je zakliknutá žiadna dostupnosť. Prosím vyber aspoň jeden blok.");
        return;
    }

    // Odstráň staré hidden inputy
    this.querySelectorAll("input[name='availability'], input[name='services']")
        .forEach(el => el.remove());

    // Zakliknuté checkboxy
    const availInput = document.createElement("input");
    availInput.type = "hidden";
    availInput.name = "availability";
    availInput.value = checked.join(",");
    this.appendChild(availInput);

    // Poradie služieb → "Bar,Šatňa,SBS,..."
    const services = [...document.querySelectorAll("#services tbody tr")]
        .map(tr => tr.querySelector("td:last-child input").checked ? tr.querySelector("td:first-child").innerText : "")
        .filter(it => it !== "");

    console.log(services)
    const servInput = document.createElement("input");
    servInput.type = "hidden";
    servInput.name = "services";
    servInput.value = services.join(",");
    this.appendChild(servInput);
});
</script>
</body>
</html>
