<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dobrovoľníci – Majáles</title>
    <link type="text/css" rel="stylesheet" href="/stylesheet.css">
</head>

<body>
<div class="obal">
    <h1>Dobrovoľníci</h1>

    <p>
        Ak sa chceš zapojiť do organizácie Majálesu,
        vyplň formulár nižšie. Uveď svoje meno, p-mail, preferované služby
        a v harmonograme vyklikaj časy, kedy si dostupný.
    </p>
    <div style="height:1.5rem;"></div>

    <h3>Harmonogram a moja dostupnosť</h3>
    <p>Pozri si harmonogram a zaklikni bloky, kedy môžeš prísť pomôcť.</p>


    <table id="calendar">
        <colgroup>
            <col style="width: 30px">
            <col style="width: 100px">
            <col style="width: 100px">
        </colgroup>

        <thead>
        <tr>
            <th>Čas</th>
            <th>Program</th>
            <th>Dostupnosť</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div style="height:1.5rem;"></div>

    
    <form method="post">
        <label for="name">Meno a priezvisko:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Emailová adresa:</label>
        <input type="email" id="email" name="email" required>

        <div style="height:1rem;"></div>
        <input class="button" style="width:100%;" type="submit" value="Odoslať">
    </form>
</div>

<script th:inline="javascript">
const SERVICES = ['Vstup','SBS','Šatňa','Zmenáreň','Upratovanie','Bar','Výdaj jedla','Iné'];

const program = [
    { rowspan: 12, color: '#fa0000', text: 'Registrácia' },
    { rowspan: 12, color: '#00fa00', text: 'Sv. omša' },
    { rowspan:  3, color: '#0000fa', text: 'Otvorenie' },
    { rowspan:  7, color: '#fa00fa', text: 'Tanečné kolo' },
    { rowspan:  2, color: '#fafafa', text: '' },
    { rowspan:  4, color: '#00fafa', text: 'Divadlo' },
    { rowspan:  8, color: '#fa00fa', text: 'Tanečné kolo' },
    { rowspan:  2, color: '#fafafa', text: '' },
    { rowspan:  6, color: '#fa00fa', text: 'Škola tanca' },
    { rowspan:  8, color: '#fa00fa', text: 'Tanečné kolo' },
    { rowspan:  2, color: '#fafafa', text: '' },
    { rowspan:  4, color: '#00fafa', text: 'Súťaže' },
    { rowspan:  8, color: '#fa00fa', text: 'Tanečné kolo' },
    { rowspan:  3, color: '#0000fa', text: 'Fotka' },
    { rowspan:  6, color: '#00fafa', text: 'Vatra' },
    { rowspan:  9, color: '#fa00fa', text: 'Tanečné kolo' },
];


let startHour = 18;
let endHour = 2;
let totalHours = (endHour <= startHour)
    ? (endHour + 24 - startHour)
    : (endHour - startHour);

let blockMinutes = 120;
let blockRowspan = blockMinutes / 5;


function renderTable() {
    let tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    let totalRows = totalHours * 12;

    let programIndex = 0;
    let remainingSpan = program[0]?.rowspan || 0;

    for (let row = 0; row < totalRows; row++) {
        let tr = document.createElement("tr");

        let currentHour = Math.floor(row / 12) + startHour;
        let displayHour = currentHour % 24;
        let minute = (row % 12) * 5;

        // ===== 1. STĹPEC – HODINY =====
        if (minute === 0) {
            let td = document.createElement("td");
            td.rowSpan = 12;
            td.innerText = displayHour + ":00";
            tr.appendChild(td);
        }

        // ===== 2. STĹPEC – EVENTY =====
        if (remainingSpan === program[programIndex].rowspan) {
            let td = document.createElement("td");
            td.rowSpan = program[programIndex].rowspan;
            td.innerText = program[programIndex].text;
            td.style.backgroundColor = program[programIndex].color;
            tr.appendChild(td);
        }

        remainingSpan--;

        if (remainingSpan === 0) {
            programIndex++;
            if (program[programIndex]) {
                remainingSpan = program[programIndex].rowspan;
            }
        }

        // ===== 3. STĹPEC – CHECKBOXY =====
        if (row % blockRowspan === 0) {
            let td = document.createElement("td");
            td.rowSpan = blockRowspan;

            let checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.style.display = "none";

            let startH = (Math.floor(row / 12) + startHour) % 24;
            let endH = (startH + blockMinutes / 60) % 24;

            checkbox.dataset.start = startH;
            checkbox.dataset.end = endH;

            td.appendChild(checkbox);

            td.addEventListener("click", () => {
                checkbox.checked = !checkbox.checked;
                td.classList.toggle("active", checkbox.checked);
            });

            td.style.cursor = "pointer";
            tr.appendChild(td);
        }

        tbody.appendChild(tr);
    }
}


renderTable();
</script>
</body>
</html>
