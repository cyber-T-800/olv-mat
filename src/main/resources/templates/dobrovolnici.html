<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dobrovoľníci – Majáles</title>
    <link type="text/css" rel="stylesheet" href="/stylesheet.css">
</head>

<body>
<div class="obal">
    <h1>Dobrovoľníci</h1>

    <p>
        Ak sa chceš zapojiť do organizácie Majálesu,
        vyplň formulár nižšie. Uveď svoje meno, p-mail, preferované služby
        a v harmonograme vyklikaj časy, kedy si dostupný.
    </p>
    <div style="height:1.5rem;"></div>

    <h3>Harmonogram a moja dostupnosť</h3>
    <p>Pozri si harmonogram a zaklikni bloky, kedy môžeš prísť pomôcť.</p>


    <table id="calendar">
        <colgroup>
            <col style="width: 30px">
            <col style="width: 100px">
            <col style="width: 100px">
        </colgroup>

        <thead>
        <tr>
            <th>Čas</th>
            <th>Program</th>
            <th>Dostupnosť</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>
    <div style="height:1.5rem;"></div>

    
    <form method="post">
        <label for="name">Meno a priezvisko:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Emailová adresa:</label>
        <input type="email" id="email" name="email" required>

        <div style="height:1rem;"></div>
        <input class="button" style="width:100%;" type="submit" value="Odoslať">
    </form>
</div>

<script th:inline="javascript">
const SERVICES = ['Vstup','SBS','Šatňa','Zmenáreň','Upratovanie','Bar','Výdaj jedla','Iné'];

const program = [
    { sh: 18, sm:  0, eh: 19, em:  0, text: 'Registrácia' },
    { sh: 19, sm:  0, eh: 20, em:  0, text: 'Sv. omša' },
    { sh: 20, sm:  0, eh: 20, em: 10, text: 'Otvorenie' },
    { sh: 20, sm: 10, eh: 20, em: 40, text: 'Tanečné kolo' },
    { sh: 20, sm: 40, eh: 20, em: 50, text: 'Prestávka' },
    { sh: 20, sm: 50, eh: 21, em: 20, text: 'Škola tanca' },
    { sh: 21, sm: 20, eh: 21, em: 50, text: 'Tanečné kolo' },
    { sh: 21, sm: 50, eh: 22, em:  0, text: 'Prestávka' },
    { sh: 22, sm:  0, eh: 22, em: 20, text: 'Súťaže' },
    { sh: 22, sm: 20, eh: 22, em: 50, text: 'Tanečné kolo' },
    { sh: 22, sm: 50, eh: 23, em:  5, text: 'Fotka' },
    { sh: 23, sm:  5, eh: 23, em: 25, text: 'Limbo' },
    { sh: 23, sm: 25, eh:  0, em:  0, text: 'Tanečné kolo' },
    { sh:  0, sm:  0, eh:  0, em: 30, text: 'Tombola' },
    { sh:  0, sm: 30, eh:  2, em:  0, text: 'Voľná zábava' },
];


let startHour = 18;
let endHour = 2;

let rowMinutes = 5;
let blockMinutes = 120;

function normalizeHour(h) {
    return (h < startHour) ? h + 24 : h;
}

function timeToRow(h, m) {
    let minutes = (normalizeHour(h) - startHour) * 60 + m;
    return Math.floor(minutes / rowMinutes);
}


function renderTable() {
    let tbody = document.querySelector("#calendar tbody");
    tbody.innerHTML = "";

    // výpočty
    let timeRowspan = 60 / rowMinutes;
    let blockRowspan = blockMinutes / rowMinutes;

    let totalHours = (endHour <= startHour)
        ? (endHour + 24 - startHour)
        : (endHour - startHour);

    let totalRows = totalHours * (60 / rowMinutes);

    // ====== EVENT MAP ======
    let eventMap = {};

    program.forEach(p => {
        let start = timeToRow(p.sh, p.sm);
        let end = timeToRow(p.eh, p.em);
        let length = end - start;

        eventMap[start] = {
            name: p.text,
            rowspan: length
        };
    });

    // ====== GENEROVANIE ======
    for (let row = 0; row < totalRows; row++) {
        let tr = document.createElement("tr");

        let currentHour = Math.floor(row / timeRowspan) + startHour;
        let displayHour = currentHour % 24;
        let minute = (row % timeRowspan) * rowMinutes;

        // ===== 1. STĹPEC – HODINY =====
        if (minute === 0) {
            let td = document.createElement("td");
            td.rowSpan = timeRowspan;
            td.innerText = displayHour + ":00";
            tr.appendChild(td);
        }

        // ===== 2. STĹPEC – EVENTY =====
        if (eventMap[row]) {
            let td = document.createElement("td");
            td.rowSpan = eventMap[row].rowspan;
            td.innerText = eventMap[row].name;
            tr.appendChild(td);
        } else {
            let insideEvent = false;

            for (let start in eventMap) {
                let p = eventMap[start];
                if (row > start && row < (+start + p.rowspan)) {
                    insideEvent = true;
                    break;
                }
            }

            if (!insideEvent) {
                let td = document.createElement("td");
                tr.appendChild(td);
            }
        }

        // ===== 3. STĹPEC – CHECKBOXY =====
        if (row % blockRowspan === 0) {
            let td = document.createElement("td");
            td.rowSpan = blockRowspan;

            let checkbox = document.createElement("input");
            checkbox.type = "checkbox";

            let startH = (Math.floor(row / timeRowspan) + startHour) % 24;
            let endH = (startH + blockMinutes / 60) % 24;

            checkbox.dataset.start = startH;
            checkbox.dataset.end = endH;

            td.appendChild(checkbox);
            tr.appendChild(td);
        }

        tbody.appendChild(tr);
    }
}


renderTable();
</script>
</body>
</html>
