<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="sk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rezervácia lístka</title>
    <link type="text/css" rel="stylesheet" href="/stylesheet.css">
</head>

<body>
<div class="obal">
    <div th:utext="${popisUdalosti}">

    </div>


    <p>Ak máš túžbu pridať ruku k dielu, pridaj sa do kolektívu dobrovoľníkov:</p>

    <a href="dobrovolnici"
       class="button" style="margin-left: 0.75rem;">
        <strong>Viac informácií</strong>
    </a>
    <div style="height:4rem;"></div>


    <h3>Aktuálna obsadenosť</h3>
    <div class="bar-bg">
        <div id="barFill" class="bar-fill">
            <span id="barFillText" style="vertical-align: center;"></span>
        </div>
        <div id="barText" class="bar-text"></div>
    </div>
    <div style="height:1.5rem;"></div>


    <form method="post" action="">
        <label for="name">Meno a priezvisko:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Emailová adresa:</label>
        <input type="email" id="email" name="email" required>


        <fieldset style="margin-top:1rem;">
            <legend>Typ lístka:</legend>
            <label>
                <input type="radio" name="ticketType" value="STUDENT" checked required>
                Študentský
            </label>
            <label>
                <input type="radio" name="ticketType" value="NESTUDENT" required>
                Neštudentský
            </label>
        </fieldset>

        <div style="height:1rem;"></div>
        <input class="button" style="width: 100%;" type="submit" value="Odoslať rezerváciu">
    </form>
</div>

<script th:inline="javascript">
    const barFill = document.getElementById("barFill");
    const barFillText = document.getElementById("barFillText");

    const percentObsadene = /*[[${percentObsadene}]]*/ 0;
    const lastListky = /*[[${lastListky}]]*/ null;

    function skMiesta(n) {
        if (n === 1) return "Posledné miesto";
        if (n >= 2 && n <= 4) return "Posledné " + n + " miesta";
        return "Posledných " + n + " miest";
    }

    function updateUI() {
        // fill the bar
        barFill.style.width = percentObsadene + "%";

        // decide what text to show
        if (lastListky !== null) {
            barFillText.innerText = skMiesta(lastListky);
        } else {
            barFillText.innerText = percentObsadene.toFixed(1) + "%";
        }
    }

    updateUI();
</script>
</body>
</html>
